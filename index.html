   <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Constancia de Situación Fiscal — $60 MXN | Trámites Digitales</title>
  <meta name="description" content="Obtén tu Constancia de Situación Fiscal en 10 minutos. Solo necesitas tu RFC e IDCIF. Proceso seguro, precio fijo $60 MXN. Atendemos sábados y domingos."/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0D0F14;--paper:#F7F6F2;--accent:#1A6BFF;
      --green:#00C896;--red:#FF4444;--muted:#6B7080;
      --card:#FFFFFF;--border:#E2E4EA;--wa:#25D366;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}

    /* ══ URGENCY BAR ══ */
    .urgency-bar{background:linear-gradient(90deg,#0D0F14,#1a2340);color:#fff;text-align:center;padding:.6rem 1rem;font-size:.82rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:.6rem;flex-wrap:wrap}
    .urgency-bar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 1.4s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .countdown{font-family:'Syne',sans-serif;font-weight:800;color:var(--green);font-size:.95rem;letter-spacing:.04em}

    /* ══ MEJORA 9: CUPOS DEL DÍA ══ */
    .cupos-bar{background:#fff8e6;border-bottom:1px solid #ffe5a0;padding:.55rem 1rem;text-align:center;font-size:.82rem;font-weight:500;color:#7a5c00;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .cupos-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#d97706}
    .cupos-bar .cupos-dots{display:flex;gap:3px;align-items:center}
    .cupo-dot{width:10px;height:10px;border-radius:50%;background:#d97706}
    .cupo-dot.taken{background:#e5e7eb}

    /* ══ LIVE TOAST ══ */
    .live-toast{position:fixed;bottom:5.5rem;left:1.2rem;z-index:900;background:#fff;border:1px solid var(--border);border-left:4px solid var(--green);border-radius:12px;padding:.75rem 1rem;box-shadow:0 8px 32px rgba(0,0,0,.12);display:flex;align-items:center;gap:.75rem;max-width:280px;font-size:.8rem;transform:translateX(-120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
    .live-toast.show{transform:translateX(0)}
    .live-toast-icon{font-size:1.4rem;flex-shrink:0}
    .live-toast strong{display:block;font-weight:600;color:var(--ink);font-size:.82rem}
    .live-toast span{color:var(--muted)}

    /* ══ MEJORA 13: AGENTE EN LÍNEA ══ */
    .agent-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.5rem clamp(1rem,4vw,3rem);display:flex;align-items:center;justify-content:center;gap:.6rem;font-size:.8rem;color:var(--muted)}
    .agent-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite;flex-shrink:0}
    .agent-name{font-weight:600;color:var(--ink)}

    /* ══ NAV ══ */
    nav{position:sticky;top:0;z-index:200;background:rgba(247,246,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 clamp(1.25rem,5vw,4rem);height:60px;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:-.01em;color:var(--ink);text-decoration:none}
    .nav-brand span{color:var(--accent)}
    .nav-cta{background:var(--wa);color:#fff;border:none;border-radius:8px;padding:.45rem 1.1rem;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s;display:flex;align-items:center;gap:.4rem}
    .nav-cta:hover{opacity:.88}

    /* ══ PROGRESS BAR ══ */
    .progress-bar-wrap{position:fixed;top:60px;left:0;right:0;z-index:190;background:var(--card);border-bottom:1px solid var(--border);padding:.55rem clamp(1rem,4vw,3rem);display:flex;align-items:center;gap:1rem;transform:translateY(-100%);transition:transform .3s}
    .progress-bar-wrap.visible{transform:translateY(0)}
    .progress-steps{display:flex;align-items:center;gap:.4rem;flex:1}
    .prog-step{display:flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600;color:var(--muted)}
    .prog-step.done{color:var(--green)}
    .prog-step.done .prog-dot{background:var(--green)}
    .prog-dot{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0}
    .prog-line{height:2px;flex:1;background:var(--border);border-radius:2px;min-width:16px}
    .prog-line.done{background:var(--green)}
    .prog-cta{background:var(--wa);color:#fff;border:none;border-radius:8px;padding:.4rem 1rem;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
    @media(max-width:500px){.prog-step span{display:none}}

    /* ══ EXIT POPUP ══ */
    .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem}
    .popup-overlay.show{display:flex}
    .popup-box{background:var(--card);border-radius:20px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:pop-in .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes pop-in{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .popup-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1}
    .popup-emoji{font-size:3rem;margin-bottom:1rem}
    .popup-box h3{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.6rem}
    .popup-box p{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6}
    .popup-price{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--accent);margin-bottom:1.5rem}
    .popup-price small{font-size:1rem;color:var(--muted);font-family:'Inter',sans-serif;font-weight:500}
    .popup-btn{display:block;width:100%;background:var(--wa);color:#fff;border:none;border-radius:12px;padding:1rem;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center}

    /* ══ HERO ══ */
    .hero{padding:clamp(3.5rem,8vw,7rem) clamp(1.25rem,5vw,4rem) clamp(2.5rem,6vw,5rem);max-width:900px;margin:0 auto;text-align:center}
    .eyebrow{display:inline-block;font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(26,107,255,.08);border-radius:100px;padding:.3rem .9rem;margin-bottom:1.4rem}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,7vw,4.8rem);font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-bottom:1.1rem}
    .hero h1 em{font-style:normal;background:linear-gradient(110deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-size:clamp(1rem,2.5vw,1.15rem);color:var(--muted);max-width:500px;margin:0 auto 2.2rem;line-height:1.65}
    .price-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:.4rem;margin-bottom:1.6rem}
    .price-badge{display:inline-flex;align-items:baseline;gap:.4rem;background:var(--ink);color:#fff;border-radius:16px;padding:.9rem 2rem}
    .price-currency{font-size:1.4rem;font-weight:600;opacity:.6}
    .price-amount{font-family:'Syne',sans-serif;font-size:3.6rem;font-weight:800;line-height:1}
    .price-label{font-size:.8rem;opacity:.55;align-self:flex-end;margin-bottom:.35rem}
    .price-urgency{font-size:.78rem;font-weight:600;color:var(--red);background:rgba(255,68,68,.08);border-radius:100px;padding:.25rem .8rem;letter-spacing:.04em;animation:pulse-red 2s infinite}
    @keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
    .trust-seals{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem 1.2rem;margin-bottom:1.8rem}
    .seal{display:flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:100px;padding:.3rem .8rem}
    .hero-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}

    /* ══ MEJORA 11: BOTÓN MAGNÉTICO ══ */
    .btn-primary{display:inline-flex;align-items:center;gap:.5rem;background:var(--wa);color:#fff;border:none;border-radius:12px;padding:.9rem 2rem;font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .1s,box-shadow .15s;box-shadow:0 4px 20px rgba(37,211,102,.4);position:relative;overflow:hidden}
    .btn-primary::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .2s}
    .btn-primary:hover::after{opacity:1}
    .btn-primary:hover{box-shadow:0 8px 32px rgba(37,211,102,.55)}
    .btn-secondary{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--ink);border:1.5px solid var(--border);border-radius:12px;padding:.9rem 2rem;font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .trust-strip{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem 1.4rem;max-width:520px;margin:0 auto;padding-top:.4rem}
    .trust-item{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted)}
    .trust-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

    /* ══ DIVIDER ══ */
    .section-divider{border:none;border-top:1px solid var(--border);max-width:1100px;margin:0 auto}

    /* ══ STATS ══ */
    .stats-bar{background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2rem clamp(1.25rem,5vw,4rem)}
    .stats-inner{max-width:800px;margin:0 auto;display:flex;justify-content:center;gap:clamp(2rem,8vw,6rem);flex-wrap:wrap}
    .stat-item{text-align:center}
    .stat-num{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;color:var(--accent);line-height:1}
    .stat-label{font-size:.78rem;color:var(--muted);margin-top:.3rem}

    /* ══ MEJORA 14: PARA QUIÉN ES ══ */
    .para-quien{padding:clamp(3rem,6vw,5rem) clamp(1.25rem,5vw,4rem);max-width:1100px;margin:0 auto}
    .para-quien h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.5rem}
    .pq-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
    .pq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
    .pq-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.3rem;display:flex;gap:.8rem;align-items:flex-start;transition:border-color .2s,transform .2s}
    .pq-card:hover{border-color:var(--green);transform:translateY(-2px)}
    .pq-icon{font-size:1.6rem;flex-shrink:0}
    .pq-title{font-weight:700;font-size:.9rem;margin-bottom:.2rem}
    .pq-desc{font-size:.8rem;color:var(--muted);line-height:1.5}

    /* ══ TABLA COMPARATIVA ══ */
    .compare{padding:clamp(3rem,6vw,5rem) clamp(1.25rem,5vw,4rem);max-width:1100px;margin:0 auto}
    .compare h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.5rem}
    .compare-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
    .compare-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border)}
    .compare-table th{padding:.9rem 1.2rem;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:#f8f9fb;border-bottom:1px solid var(--border);text-align:left}
    .compare-table th:not(:first-child){text-align:center}
    .compare-table td{padding:.9rem 1.2rem;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:middle}
    .compare-table tr:last-child td{border-bottom:none}
    .compare-table td:not(:first-child){text-align:center}
    .compare-table .col-us{background:rgba(26,107,255,.04);font-weight:600}
    .col-head-us{color:var(--accent)!important}
    .check{color:var(--green);font-size:1.1rem}
    .cross{color:#ccc;font-size:1.1rem}
    .compare-table td.feat-name{font-weight:500}

    /* ══ MEJORA 10: CALCULADORA ══ */
    .calculadora{padding:clamp(3rem,6vw,5rem) clamp(1.25rem,5vw,4rem);background:var(--ink);color:#fff}
    .calc-inner{max-width:700px;margin:0 auto;text-align:center}
    .calc-inner h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.5rem}
    .calc-sub{color:rgba(255,255,255,.55);font-size:.9rem;margin-bottom:2.5rem}
    .calc-controls{display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem}
    .calc-row{display:flex;flex-direction:column;gap:.5rem;text-align:left}
    .calc-row label{font-size:.82rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase}
    .calc-row input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.2);outline:none;cursor:pointer}
    .calc-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 0 0 4px rgba(0,200,150,.25)}
    .calc-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--green)}
    .calc-result{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:2rem;margin-top:1rem}
    .calc-result-label{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em}
    .calc-result-num{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--green);line-height:1;margin-bottom:.5rem}
    .calc-result-msg{font-size:.85rem;color:rgba(255,255,255,.55);line-height:1.6}
    .calc-cta{display:inline-flex;align-items:center;gap:.5rem;background:var(--wa);color:#fff;border:none;border-radius:12px;padding:.85rem 1.8rem;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;margin-top:1.5rem;transition:opacity .2s}
    .calc-cta:hover{opacity:.88}

    /* ══ FEATURES ══ */
    .features{padding:clamp(3rem,7vw,6rem) clamp(1.25rem,5vw,4rem);max-width:1100px;margin:0 auto}
    .section-label{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2.5rem}
    .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.2rem}
    .feat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.6rem 1.4rem;transition:box-shadow .2s,transform .2s}
    .feat-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.07)}
    .feat-icon{font-size:1.8rem;margin-bottom:1rem;display:block}
    .feat-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.4rem}
    .feat-desc{font-size:.86rem;color:var(--muted);line-height:1.6}

    /* ══ HOW IT WORKS ══ */
    .how{padding:clamp(3rem,7vw,6rem) clamp(1.25rem,5vw,4rem);background:var(--ink);color:#fff}
    .how-inner{max-width:1100px;margin:0 auto}
    .how h2{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.5rem}
    .how-sub{color:rgba(255,255,255,.5);font-size:.9rem;margin-bottom:2.5rem}
    .steps{display:flex;flex-direction:column}
    .step{display:grid;grid-template-columns:48px 1fr;gap:1rem;padding:1.4rem 0;border-top:1px solid rgba(255,255,255,.1);align-items:start}
    .step:last-child{border-bottom:1px solid rgba(255,255,255,.1)}
    .step-num{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--green);line-height:1;padding-top:.1rem}
    .step-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.3rem}
    .step-desc{font-size:.86rem;color:rgba(255,255,255,.55);line-height:1.65}

    /* ══ MEJORA 12: CHAT PREVIEW ══ */
    .chat-preview{padding:clamp(3rem,6vw,5rem) clamp(1.25rem,5vw,4rem);max-width:1100px;margin:0 auto}
    .chat-preview h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.5rem}
    .chat-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
    .chat-window{background:#e5ddd5;border-radius:16px;padding:1.2rem;max-width:420px;font-size:.85rem;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c1b09a' fill-opacity='0.12'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-5h15v-5H20zM20 0H0v5h5v5H0v5h20z'/%3E%3C/g%3E%3C/svg%3E")}
    .chat-header{background:#075e54;color:#fff;border-radius:10px 10px 0 0;padding:.7rem 1rem;display:flex;align-items:center;gap:.7rem;margin:-1.2rem -1.2rem 1rem}
    .chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0}
    .chat-agent-name{font-weight:700;font-size:.88rem}
    .chat-status{font-size:.72rem;opacity:.8}
    .msg{margin-bottom:.7rem;display:flex;flex-direction:column}
    .msg.agent{align-items:flex-start}
    .msg.user{align-items:flex-end}
    .msg-bubble{padding:.6rem .9rem;border-radius:10px;max-width:80%;line-height:1.5;position:relative;font-size:.83rem}
    .msg.agent .msg-bubble{background:#fff;border-radius:0 10px 10px 10px}
    .msg.user .msg-bubble{background:#dcf8c6;border-radius:10px 10px 0 10px}
    .msg-time{font-size:.65rem;color:rgba(0,0,0,.4);margin-top:.2rem;padding:0 .3rem}
    .msg.user .msg-time{display:flex;align-items:center;gap:.2rem}
    .chat-typing{display:flex;align-items:center;gap:.3rem;padding:.5rem .9rem;background:#fff;border-radius:0 10px 10px 10px;width:fit-content}
    .typing-dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:typing 1.4s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    .chat-cta{margin-top:1.2rem;display:inline-flex;align-items:center;gap:.5rem;background:var(--wa);color:#fff;border:none;border-radius:12px;padding:.85rem 1.8rem;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.35)}

    /* ══ TESTIMONIOS ══ */
    .testimonios{padding:clamp(3rem,7vw,6rem) clamp(1.25rem,5vw,4rem);max-width:1100px;margin:0 auto}
    .testimonios h2{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;margin-bottom:.4rem}
    .testi-sub{color:var(--muted);font-size:.9rem;margin-bottom:2.2rem}
    .testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2rem}
    .testi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
    .stars{color:#FFBA08;font-size:1rem;margin-bottom:.8rem;letter-spacing:.05em}
    .testi-text{font-size:.88rem;line-height:1.65;color:var(--ink);margin-bottom:1rem;font-style:italic}
    .testi-author{display:flex;align-items:center;gap:.6rem}
    .testi-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0}
    .testi-name{font-weight:600;font-size:.82rem}
